opentp: 2025-06

event:
  key: auth::signup_complete

  lifecycle:
    status: active

  taxonomy:
    area: auth
    event: signup_complete
    action: User completes registration

  payload:
    platforms:
      all:
        active: 1.0.0
        history:
          1.0.0:
            changes: []
            schema:
              application_id:
                value: web-app
              event_name:
                value: signup_complete
              event_category:
                value: auth
              signup_method:
                type: string
                enum: [email, google, github]
                required: true
              has_referral:
                type: boolean
                required: false
