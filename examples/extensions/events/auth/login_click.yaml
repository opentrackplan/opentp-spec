opentp: 2026-01

event:
  key: auth::login_click

  taxonomy:
    action: User clicks the login button

  payload:
    schema:
      event_name:
        value: login_click
        x-opentp:
          role: constant
      user_id:
        type: string
        x-opentp:
          checks:
            mytool.starts-with: "usr_"
