opentp: 2026-01

event:
  key: dashboard::dashboard_view

  lifecycle:
    status: active

  taxonomy:
    action: User opens the dashboard

  payload:
    schema:
      application_id:
        value: web-app
      event_name:
        value: dashboard_view
      event_category:
        value: dashboard
      dimension_1:
        value: enterprise
      widgets_count:
        type: number
        example: 7
        required: false
      has_notifications:
        type: boolean
        example: true
        required: false
