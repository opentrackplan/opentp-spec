opentp: 2025-12

event:
  key: dashboard::dashboard_view

  lifecycle:
    status: active

  taxonomy:
    action: User opens the dashboard

  payload:
    schema:
      application_id:
        value: web-app
      event_name:
        value: dashboard_view
      event_category:
        value: dashboard
      widgets_count:
        type: number
        required: false
      has_notifications:
        type: boolean
        required: false
