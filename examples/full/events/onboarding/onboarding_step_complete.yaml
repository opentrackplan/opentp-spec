opentp: 2025-12

event:
  key: onboarding::onboarding_step_complete

  lifecycle:
    status: active

  taxonomy:
    action: User completes an onboarding step

  payload:
    mobile:
      schema:
        application_id:
          value: mobile-app
        event_name:
          value: onboarding_step_complete
        event_category:
          value: onboarding
        step_number:
          type: number
          required: true
        step_name:
          type: string
          required: true
          checks:
            max-length: 100
        is_skipped:
          type: boolean
          required: false
