opentp: 2026-01

info:
  title: Example Tracking Plan
  version: 1.0.0
  description: Sample tracking plan for demonstration purposes
  contact:
    - Analytics Team <analytics@example.com>

spec:
  paths:
    events:
      root: /events
      template: "{area}/{event}.yaml"
    dictionaries:
      root: /dictionaries

  events:
    key:
      pattern: "^[a-z0-9_]+::[a-z0-9_]+$"

    taxonomy:
      area:
        title: Area
        type: string
        dict: taxonomy/areas
        required: true
      event:
        title: Event
        type: string
        required: true
      action:
        title: Action
        type: string
        description: Human-readable description of what triggers the event
        maxLength: 100
        required: true
      priority_level:
        title: Priority Level
        type: number
        enum: [1, 2, 3]
        required: false
      is_internal:
        title: Internal Event
        type: boolean
        enum: [true, false]
        required: false

    payload:
      targets:
        all: [web, ios, android]
        mobile: [ios, android]
      schema:
        application_id:
          type: string
          dict: data/application_id
          required: true
          valueRequired: true
        event_name:
          type: string
          required: true
        event_category:
          type: string
          required: true
        dimension_1:
          type: string
          name: orgType
          title: Organization Type
          description: Logical organization type stored in analytics slot dimension_1
          enum: [startup, enterprise, agency]
          example: enterprise
          required: false
        user_id:
          type: string
          required: false

    pii:
      kind:
        required: true
        dict: governance/pii-kinds
      masker:
        required: false
      schema:
        owner:
          type: string
          dict: governance/pii-owners
          required: true
        jira:
          type: string
          required: true
          pattern: "^[A-Z]+-[0-9]+$"
        retention_days:
          type: number
          enum: [0, 7, 30]
          required: false
