opentp: 2025-12

info:
  title: Simple Tracking Plan
  version: 1.0.0
  description: Minimal example with unversioned payload

spec:
  paths:
    events:
      root: /events
      pattern: "{area}/{event}.yaml"

  events:
    key:
      pattern: "{area}::{event}"

    taxonomy:
      area:
        title: Area
        type: string
        required: true
      event:
        title: Event
        type: string
        required: true
      action:
        title: Action
        type: string
        required: true

    payload:
      targets:
        all: [web]
      schema:
        event_name:
          type: string
          required: true
        auth_method:
          type: string
          required: false
