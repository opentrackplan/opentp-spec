opentp: 2026-01

info:
  title: Simple Tracking Plan
  version: 1.0.0
  description: Minimal example with unversioned payload

spec:
  paths:
    events:
      root: /events
      template: "{area}/{event}.yaml"

  events:
    key:
      pattern: "^[a-z0-9_]+::[a-z0-9_]+$"

    taxonomy:
      area:
        title: Area
        type: string
        required: true
      event:
        title: Event
        type: string
        required: true
      action:
        title: Action
        type: string
        required: true

    payload:
      targets:
        all: [web]
      schema:
        event_name:
          type: string
          required: true
        auth_method:
          type: string
          required: false
